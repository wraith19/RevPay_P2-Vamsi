<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Request Center')}"></head>

<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="main-content">
    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="page-header">
        <h1>Request Center</h1>
    </div>

    <div class="card form-card">
        <h3 class="section-title">Request Money</h3>
        <form th:action="@{/requests/create}" method="post" class="app-form">
            <div class="form-group">
                <label for="requesteeIdentifier">Request From (Email or Phone) *</label>
                <input type="text" id="requesteeIdentifier" name="requesteeIdentifier" required class="form-control"
                       placeholder="john@example.com or +1XXXXXXXXXX">
            </div>
            <div class="form-group">
                <label for="amount">Amount ($) *</label>
                <input type="number" id="amount" name="amount" required min="0.01" step="0.01" class="form-control"
                       placeholder="0.00">
            </div>
            <div class="form-group">
                <label for="purpose">Purpose (Optional)</label>
                <textarea id="purpose" name="purpose" class="form-control" rows="3"
                          placeholder="What's this for?"></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Send Money Request</button>
                <a th:href="@{/requests/outgoing}" class="btn btn-secondary">View Outgoing</a>
            </div>
        </form>
    </div>

    <div th:if="${isBusiness}" class="card form-card">
        <h3 class="section-title">Send Invoice</h3>
        <p class="form-hint">Business users can send invoices directly to any registered personal or business customer.</p>
        <div class="form-actions" style="margin-top:0.75rem;">
            <a th:href="@{/invoices/create}" class="btn btn-primary">Create Invoice</a>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>

</html>
