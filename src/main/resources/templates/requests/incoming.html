<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Incoming Requests')}"></head>

<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="main-content">
    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="page-header">
        <h1>Incoming Requests</h1>
        <a th:href="@{/requests/outgoing}" class="btn btn-secondary">View Outgoing -></a>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>Money Requests</h2>
        </div>
        <div th:if="${#lists.isEmpty(requests)}" class="empty-state">
            <p>No incoming money requests.</p>
        </div>
        <table th:unless="${#lists.isEmpty(requests)}" class="data-table">
            <thead>
            <tr>
                <th>From</th>
                <th>Amount</th>
                <th>Purpose</th>
                <th>Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="req : ${requests}">
                <td th:text="${req.requester.fullName}">John</td>
                <td class="amount">$<span th:text="${#numbers.formatDecimal(req.amount, 1, 2)}">0.00</span></td>
                <td th:text="${req.purpose ?: '-'}">-</td>
                <td th:text="${#temporals.format(req.createdAt, 'MMM dd, yyyy')}">Jan 01</td>
                <td><span class="badge" th:classappend="'badge-' + ${req.status.name().toLowerCase()}"
                          th:text="${req.status}">PENDING</span></td>
                <td th:if="${req.status.name() == 'PENDING'}">
                    <form th:action="@{'/requests/' + ${req.id} + '/accept'}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-success">Accept</button>
                    </form>
                    <form th:action="@{'/requests/' + ${req.id} + '/decline'}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-danger">Decline</button>
                    </form>
                </td>
                <td th:if="${req.status.name() != 'PENDING'}">-</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>Invoice Requests</h2>
        </div>
        <div th:if="${#lists.isEmpty(receivedInvoices)}" class="empty-state">
            <p>No invoices addressed to you.</p>
        </div>
        <table th:unless="${#lists.isEmpty(receivedInvoices)}" class="data-table">
            <thead>
            <tr>
                <th>Invoice #</th>
                <th>From Business</th>
                <th>Amount</th>
                <th>Due Date</th>
                <th>Status</th>
                <th>Payment</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="inv : ${receivedInvoices}">
                <td th:text="${inv.invoiceNumber}">INV-001</td>
                <td th:text="${inv.businessUser.fullName}">Business User</td>
                <td class="amount">$<span th:text="${inv.totalAmount != null ? #numbers.formatDecimal(inv.totalAmount, 1, 2) : '0.00'}">0.00</span></td>
                <td th:text="${inv.dueDate != null ? #temporals.format(inv.dueDate, 'MMM dd, yyyy') : '-'}">-</td>
                <td><span class="badge" th:classappend="'badge-' + ${inv.status.name().toLowerCase()}"
                          th:text="${inv.status}">SENT</span></td>
                <td>
                    <form th:if="${inv.status.name() == 'SENT'}"
                          th:action="@{'/invoices/' + ${inv.id} + '/pay'}"
                          method="post"
                          class="inline-form invoice-pay-form"
                          th:attr="data-invoice-id=${inv.id}">
                        <div class="form-group" style="min-width:140px;">
                            <label style="margin-bottom:0.2rem;">Source</label>
                            <select name="paymentSource" class="form-control invoice-payment-source"
                                    th:attr="data-target=${'paymentMethodSelect-' + inv.id}">
                                <option value="WALLET">Wallet</option>
                                <option value="CARD">Saved Card</option>
                            </select>
                        </div>
                        <div class="form-group" style="min-width:190px;">
                            <label style="margin-bottom:0.2rem;">Card</label>
                            <select name="paymentMethodId" class="form-control"
                                    th:id="${'paymentMethodSelect-' + inv.id}" disabled>
                                <option value="">Select card</option>
                                <option th:each="pm : ${paymentMethods}" th:value="${pm.id}"
                                        th:text="${pm.type + ' - ' + pm.maskedCardNumber}">Card</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-sm btn-primary">Pay</button>
                    </form>
                    <span th:if="${inv.status.name() != 'SENT'}">-</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        var sourceSelectors = document.querySelectorAll('.invoice-payment-source');
        sourceSelectors.forEach(function (sourceSelect) {
            var targetId = sourceSelect.getAttribute('data-target');
            var cardSelect = document.getElementById(targetId);
            if (!cardSelect) {
                return;
            }

            function syncCardRequirement() {
                var useCard = sourceSelect.value === 'CARD';
                cardSelect.disabled = !useCard;
                cardSelect.required = useCard;
            }

            sourceSelect.addEventListener('change', syncCardRequirement);
            syncCardRequirement();
        });
    });
</script>
</body>

</html>
