<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Forgot Password')}"></head>

<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="brand-title"><i class="bi bi-shield-lock"></i> Forgot Password</h1>
            <p class="auth-subtitle">Enter your email or phone to continue</p>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <form th:action="@{/forgot-password}" method="post" class="auth-form" novalidate>
            <div class="form-group">
                <label for="identifier">Email or Phone</label>
                <input type="text" id="identifier" name="identifier" required class="form-control"
                       placeholder="Enter registered email or phone">
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                <i class="bi bi-arrow-right-circle me-1"></i>Continue
            </button>
        </form>

        <div class="auth-footer">
            <p>Back to <a th:href="@{/login}" class="link">Login</a></p>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>

</html>
