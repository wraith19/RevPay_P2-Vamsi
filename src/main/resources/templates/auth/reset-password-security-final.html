<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Reset Password')}"></head>

<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="brand-title"><i class="bi bi-key"></i> Set New Password</h1>
            <p class="auth-subtitle">Security answer verified. Set your new password.</p>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <form th:action="@{/forgot-password/reset}" method="post" class="auth-form" novalidate>
            <input type="hidden" name="identifier" th:value="${identifier}">

            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" name="newPassword" required minlength="6"
                       class="form-control" placeholder="Enter new password">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6"
                       class="form-control" placeholder="Confirm new password">
            </div>

            <button type="submit" class="btn btn-primary btn-full">
                <i class="bi bi-check2-circle me-1"></i>Reset Password
            </button>
        </form>

        <div class="auth-footer">
            <p>Back to <a th:href="@{/login}" class="link">Login</a></p>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>

</html>
