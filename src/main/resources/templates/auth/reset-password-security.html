<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Reset Password')}"></head>

<body class="auth-body">
<div class="auth-container">
    <div class="auth-card auth-card-wide">
        <div class="auth-header">
            <h1 class="brand-title"><i class="bi bi-shield-check"></i> Verify Security Question</h1>
            <p class="auth-subtitle">Answer correctly to continue to password reset</p>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <form th:action="@{/forgot-password/verify}" method="post" class="auth-form" novalidate>
            <input type="hidden" name="identifier" th:value="${identifier}">

            <div class="form-group">
                <label for="questionId">Security Question</label>
                <select id="questionId" name="questionId" class="form-control" required>
                    <option value="" selected disabled>Select your security question</option>
                    <option th:each="q : ${questions}" th:value="${q.id}" th:text="${q.question}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="answer">Answer</label>
                <input type="text" id="answer" name="answer" required class="form-control"
                       placeholder="Enter your answer">
            </div>

            <button type="submit" class="btn btn-primary btn-full">
                <i class="bi bi-check2-circle me-1"></i>Verify Answer
            </button>
        </form>

        <div class="auth-footer">
            <p>Back to <a th:href="@{/login}" class="link">Login</a></p>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>

</html>
